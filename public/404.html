<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Prism Tracker</title>
  </head>
  <body>
    <script>
      // SPA fallback for GitHub Pages.
      // Encode the current path in sessionStorage, then redirect to root.
      // index.html will read it and push the real path into history.
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('spa_redirect', path);
      window.location.replace('/');
    </script>
  </body>
</html>
